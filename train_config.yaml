model_name_or_path: models/gemma-3-270m
train_file: data/logo-detailed-prompt/train.jsonl
valid_file: data/logo-detailed-prompt/valid.jsonl
output_dir: adapter
run_dir: runs/gemma3-270m-lora

seed: 42
device: cuda:0
bf16: true
gradient_checkpointing: true

max_seq_length: 4096
epochs: 8
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 0.0002
weight_decay: 0.01
warmup_ratio: 0.05
max_grad_norm: 1.0

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
